name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact: xcde-save-editor-linux
          - os: windows-latest
            platform: windows
            artifact: xcde-save-editor-windows.exe
          - os: macos-latest
            platform: macos
            artifact: xcde-save-editor-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      # Linux: install Qt platform dependencies
      - name: Install Qt system deps (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libglib2.0-0 libgl1 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-xinerama0 libxkbcommon-x11-0 libegl1 libdbus-1-3

      - name: Build with PyInstaller
        run: uv run pyinstaller build/xcde_editor.spec --distpath dist --workpath build/work

      # Rename binary for platform
      - name: Rename artifact (Linux/macOS)
        if: matrix.platform != 'windows'
        run: mv dist/xcde-save-editor dist/${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: Move-Item dist/xcde-save-editor.exe dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/xcde-save-editor-linux/xcde-save-editor-linux
            dist/xcde-save-editor-windows.exe/xcde-save-editor-windows.exe
            dist/xcde-save-editor-macos/xcde-save-editor-macos
          generate_release_notes: true
          body: |
            ## XCDE Save Editor ${{ github.ref_name }}

            ### Download
            | Platform | File |
            |----------|------|
            | Windows  | `xcde-save-editor-windows.exe` |
            | macOS    | `xcde-save-editor-macos` |
            | Linux    | `xcde-save-editor-linux` |

            No Python installation required. Just download and run.

            ### Source
            This release includes all source code as required by the GPLv3 license.
            Original save-file research by [damysteryman](https://gitlab.com/damysteryman/XCDESave).
